<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>ZapDrop — Drop STRK like a meme</title>
    <meta name="description" content="Send STRK to any X user. They get a meme. They claim it with Google. No wallet needed." />
    <meta property="og:title" content="ZapDrop — Drop STRK like a meme" />
    <meta property="og:description" content="Send STRK to any X user. No wallet needed to claim." />
    <link rel="icon" type="image/svg+xml" href="/ZapDrop/logo.svg" />
    <!-- GitHub Pages SPA routing fix -->
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var decoded = decodeURIComponent(p[1]);
          window.history.replaceState(null, null,
            window.location.pathname.slice(0, -1) + '/' + decoded
          );
        }
      })();
    </script>
